<!DOCTYPE html>

<html lang="en">
  <head>

    <title>Change Calculator</title>
    <!--Metadata-->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="keywords" content="CCCareers, web102, change-calculator">
    <meta name="description" content="Creating Coding Careers Web 102 Change Calculator Project">
    <meta name="robots" content="noindex,nofollow">
    <!--External File Links-->
    <link rel="stylesheet" href="style.css">
  </head>

  <body>
    <!-- Write your markup here -->
    <header class="header-grid">
      <h1>Change Calculator</h1>
    </header>
    <section class="input-grid">
      <label id="amount-due-label" for="amount-due">Enter amount due</label>
      <input id="amount-due" type="number">

      <label id="amount-received-label" for="amount-received">Enter amount received</label>
      <input id="amount-received" type="number">
    </section>

    <button id="calculate-change">Cash Back</button>

    <section class="change-grid">
      <label id="dollars" for="dollars-output">Dollars</label>
      <p id="dollars-output"></p>

      <label id="quarters" for="quarters-output">Quarters</label>
      <p id="quarters-output"></p>

      <label id="dimes" for="dimes-output">Dimes</label>
      <p id="dimes-output"></p>

      <label id="nickels" for="nickels-output">Nickels</label>
      <p id="nickels-output"></p>

      <label id="pennies" for="pennies-output">Pennies</label>
      <p id="pennies-output"></p>
    </section>
    <footer class="footer-grid">

    </footer>

    <!-- External JavaScript File -->
    <script src="main.js" charset="utf-8"></script>
  </body>
</html>
